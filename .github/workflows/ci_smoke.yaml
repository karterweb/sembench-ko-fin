name: Smoke

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv sync --extra dev
      - run: uv run pytest tests/ -q
      - run: uv run python scripts/check_dataset_pii.py
      - run: uv run sembench run --config configs/ci_smoke.yaml --out results/smoke.json
      - uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: results/smoke.json
